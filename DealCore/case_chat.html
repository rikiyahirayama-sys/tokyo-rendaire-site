<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>DealCore - 案件チャット</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            background: #f5f6fa;
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* ---------- ヘッダー ---------- */
        .chat-header {
            background: #1e293b;
            color: #fff;
            padding: .75rem 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
        }

        .chat-header h5 {
            margin: 0;
            font-size: 1rem;
        }

        .chat-header .case-name {
            color: #94a3b8;
            font-size: .85rem;
        }

        /* ---------- タブ ---------- */
        .tab-bar {
            display: flex;
            border-bottom: 2px solid #e2e8f0;
            background: #fff;
            flex-shrink: 0;
        }

        .tab-btn {
            flex: 1;
            padding: .65rem;
            text-align: center;
            cursor: pointer;
            font-weight: 600;
            font-size: .9rem;
            border: none;
            background: none;
            color: #64748b;
            border-bottom: 3px solid transparent;
            transition: .2s;
        }

        .tab-btn.active-doc {
            color: #2563eb;
            border-bottom-color: #2563eb;
        }

        .tab-btn.active-adv {
            color: #d97706;
            border-bottom-color: #d97706;
        }

        .tab-btn:hover {
            background: #f1f5f9;
        }

        /* ---------- チャットエリア ---------- */
        .chat-area {
            flex: 1;
            overflow-y: auto;
            padding: 1rem;
            display: flex;
            flex-direction: column;
            gap: .75rem;
        }

        .msg {
            max-width: 85%;
            padding: .6rem .9rem;
            border-radius: 12px;
            font-size: .9rem;
            line-height: 1.5;
            word-break: break-word;
        }

        .msg-user {
            align-self: flex-end;
            background: #2563eb;
            color: #fff;
            border-bottom-right-radius: 4px;
        }

        .msg-assistant-doc {
            align-self: flex-start;
            background: #e0e7ff;
            color: #1e293b;
            border-bottom-left-radius: 4px;
        }

        .msg-assistant-adv {
            align-self: flex-start;
            background: #fef3c7;
            color: #78350f;
            border-bottom-left-radius: 4px;
        }

        .msg-system {
            align-self: center;
            background: #f1f5f9;
            color: #64748b;
            font-size: .82rem;
            text-align: center;
            border-radius: 8px;
        }

        .msg pre {
            background: rgba(0, 0, 0, .05);
            padding: .5rem;
            border-radius: 6px;
            overflow-x: auto;
            white-space: pre-wrap;
            font-size: .82rem;
        }

        .typing-indicator {
            align-self: flex-start;
            color: #94a3b8;
            font-size: .85rem;
        }

        /* ---------- 診断ボタンエリア ---------- */
        .diagnosis-bar {
            padding: .5rem 1rem;
            background: #fffbeb;
            border-bottom: 1px solid #fde68a;
            display: none;
            flex-shrink: 0;
        }

        /* ---------- ショートカット ---------- */
        .shortcut-bar {
            padding: .5rem 1rem;
            background: #fff;
            border-top: 1px solid #e2e8f0;
            display: none;
            flex-shrink: 0;
            overflow-x: auto;
            white-space: nowrap;
        }

        .shortcut-btn {
            display: inline-block;
            padding: .3rem .7rem;
            border: 1px solid #d97706;
            border-radius: 16px;
            color: #d97706;
            font-size: .78rem;
            cursor: pointer;
            margin-right: .4rem;
            background: #fff;
            transition: .15s;
        }

        .shortcut-btn:hover {
            background: #fef3c7;
        }

        /* ---------- 入力エリア ---------- */
        .input-bar {
            padding: .75rem 1rem;
            background: #fff;
            border-top: 1px solid #e2e8f0;
            flex-shrink: 0;
            display: flex;
            gap: .5rem;
        }

        .input-bar textarea {
            flex: 1;
            resize: none;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            padding: .5rem .75rem;
            font-size: .9rem;
            min-height: 42px;
            max-height: 120px;
        }

        .input-bar textarea:focus {
            outline: none;
            border-color: #2563eb;
        }

        .input-bar button {
            border-radius: 8px;
            padding: .5rem 1rem;
        }
    </style>
</head>

<body>

    <!-- ===== ヘッダー ===== -->
    <div class="chat-header">
        <div>
            <h5><i class="bi bi-chat-dots"></i> 案件チャット</h5>
            <span class="case-name" id="caseName">読込中...</span>
        </div>
        <span class="text-secondary" style="font-size:.8rem;" id="userEmail"></span>
    </div>

    <!-- ===== タブ ===== -->
    <div class="tab-bar">
        <button class="tab-btn active-doc" id="tabDoc" onclick="switchTab('doc')">
            <i class="bi bi-file-earmark-text"></i> 資料を作成する
        </button>
        <button class="tab-btn" id="tabAdv" onclick="switchTab('adv')">
            <i class="bi bi-compass"></i> 営業方針を相談する
        </button>
    </div>

    <!-- ===== 診断ボタン（アドバイザーモード時のみ表示） ===== -->
    <div class="diagnosis-bar" id="diagnosisBar">
        <button class="btn btn-warning btn-sm" onclick="runDiagnosis()" id="btnDiagnosis">
            <i class="bi bi-clipboard2-pulse"></i> 案件診断レポートを生成
        </button>
        <small class="text-muted ms-2">案件の現状を6項目で自動分析します</small>
    </div>

    <!-- ===== ショートカット（アドバイザーモード時のみ表示） ===== -->
    <div class="shortcut-bar" id="shortcutBar">
        <span class="shortcut-btn" onclick="sendShortcut('次のアクションは何をすべきですか？')">次のアクションは？</span>
        <span class="shortcut-btn" onclick="sendShortcut('この案件のリスクを整理してください')">リスクを整理して</span>
        <span class="shortcut-btn" onclick="sendShortcut('どんな買主が合いそうですか？')">どんな買主が合う？</span>
        <span class="shortcut-btn" onclick="sendShortcut('フェーズを進めてよいタイミングですか？')">フェーズ移行していい？</span>
        <span class="shortcut-btn" onclick="sendShortcut('売主の懸念点を整理してください')">売主の懸念を整理して</span>
        <span class="shortcut-btn" onclick="sendShortcut('交渉方針・トークの方向性を教えてください')">交渉方針を教えて</span>
    </div>

    <!-- ===== チャットエリア ===== -->
    <div class="chat-area" id="chatArea"></div>

    <!-- ===== 入力 ===== -->
    <div class="input-bar">
        <textarea id="msgInput" placeholder="メッセージを入力..." rows="1" onkeydown="handleKey(event)"></textarea>
        <button class="btn btn-primary" onclick="sendMessage()" id="btnSend">
            <i class="bi bi-send"></i>
        </button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        /* ====== 状態管理 ====== */
        let currentTab = '<?= tab ?>' === 'adv' ? 'adv' : 'doc';
        let caseId = '<?= caseId ?>';
        let caseName = '';
        let isLoading = false;

        /* ====== 初期化 ====== */
        document.addEventListener('DOMContentLoaded', () => {
            if (currentTab === 'adv') switchTab('adv');

            google.script.run.withSuccessHandler(email => {
                document.getElementById('userEmail').textContent = email;
            }).getCurrentUserEmail();

            if (caseId) {
                google.script.run.withSuccessHandler(c => {
                    if (c) {
                        caseName = c.name;
                        document.getElementById('caseName').textContent = c.name + ' (' + c.seller_name + ')';
                    }
                    loadHistory();
                }).apiGetCaseById(caseId);
            } else {
                document.getElementById('caseName').textContent = '案件が指定されていません';
            }
        });

        function getCaseIdFromParent_() {
            try {
                const p = new URLSearchParams(window.parent.location.search);
                return p.get('id');
            } catch (e) { return null; }
        }

        /* ====== タブ切り替え ====== */
        function switchTab(tab) {
            currentTab = tab;
            const tabDoc = document.getElementById('tabDoc');
            const tabAdv = document.getElementById('tabAdv');
            const diagBar = document.getElementById('diagnosisBar');
            const scBar = document.getElementById('shortcutBar');

            tabDoc.className = 'tab-btn' + (tab === 'doc' ? ' active-doc' : '');
            tabAdv.className = 'tab-btn' + (tab === 'adv' ? ' active-adv' : '');
            diagBar.style.display = tab === 'adv' ? 'block' : 'none';
            scBar.style.display = tab === 'adv' ? 'block' : 'none';

            loadHistory();
        }

        /* ====== 履歴読み込み ====== */
        function loadHistory() {
            const area = document.getElementById('chatArea');
            area.innerHTML = '<div class="msg msg-system"><div class="spinner-border spinner-border-sm"></div> 読込中...</div>';

            if (currentTab === 'doc') {
                google.script.run.withSuccessHandler(renderDocHistory)
                    .withFailureHandler(e => { area.innerHTML = ''; showWelcomeDoc(); })
                    .getDocChatHistory(caseId);
            } else {
                google.script.run.withSuccessHandler(renderAdvHistory)
                    .withFailureHandler(e => { area.innerHTML = ''; showWelcomeAdv(); })
                    .getAdvisorHistory(caseId);
            }
        }

        function renderDocHistory(history) {
            const area = document.getElementById('chatArea');
            area.innerHTML = '';
            if (!history || history.length === 0) { showWelcomeDoc(); return; }
            history.forEach(h => appendMsg(h.role, h.content, 'doc'));
            scrollBottom();
        }

        function renderAdvHistory(history) {
            const area = document.getElementById('chatArea');
            area.innerHTML = '';
            showWelcomeAdv();
            if (history && history.length > 0) {
                history.forEach(h => appendMsg(h.role, h.content, 'adv'));
            }
            scrollBottom();
        }

        function showWelcomeDoc() {
            const area = document.getElementById('chatArea');
            const msg = document.createElement('div');
            msg.className = 'msg msg-system';
            msg.innerHTML = '<i class="bi bi-file-earmark-text"></i> 資料作成モードです。<br>' +
                '案件に関する質問や、資料の下書き作成を依頼できます。';
            area.appendChild(msg);
        }

        function showWelcomeAdv() {
            const area = document.getElementById('chatArea');
            const msg = document.createElement('div');
            msg.className = 'msg msg-assistant-adv';
            msg.innerHTML = '<strong>' + escapeHtml(caseName || 'この案件') + '</strong>の営業方針についてご相談ください。<br>' +
                '売主の状況・資料の内容を把握しています。<br><br>' +
                '例えば以下のような相談ができます：<br>' +
                '・「次に何をすべきか教えて」<br>' +
                '・「この案件のリスクを整理して」<br>' +
                '・「どんな買主が合うか」<br>' +
                '・「売主がまだ迷っている。どう対応すべきか」';
            area.appendChild(msg);
        }

        /* ====== メッセージ送信 ====== */
        function sendMessage() {
            if (isLoading || !caseId) return;
            const input = document.getElementById('msgInput');
            const text = input.value.trim();
            if (!text) return;

            input.value = '';
            input.style.height = '42px';
            appendMsg('user', text, currentTab);
            showTyping();
            setLoading(true);

            if (currentTab === 'doc') {
                google.script.run
                    .withSuccessHandler(res => { removeTyping(); appendMsg('assistant', res.reply, 'doc'); setLoading(false); })
                    .withFailureHandler(err => { removeTyping(); showError(err.message); setLoading(false); })
                    .sendChatMessage(caseId, text);
            } else {
                google.script.run
                    .withSuccessHandler(res => { removeTyping(); appendMsg('assistant', res.reply, 'adv'); setLoading(false); })
                    .withFailureHandler(err => { removeTyping(); showError(err.message); setLoading(false); })
                    .getAdvice(caseId, text);
            }
        }

        function sendShortcut(text) {
            document.getElementById('msgInput').value = text;
            sendMessage();
        }

        /* ====== 案件診断 ====== */
        function runDiagnosis() {
            if (isLoading || !caseId) return;
            setLoading(true);
            const btn = document.getElementById('btnDiagnosis');
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> 診断中...';

            appendMsg('user', '【案件診断レポート依頼】', 'adv');
            showTyping();

            google.script.run
                .withSuccessHandler(res => {
                    removeTyping();
                    appendMsg('assistant', res.reply, 'adv');
                    btn.disabled = false;
                    btn.innerHTML = '<i class="bi bi-clipboard2-pulse"></i> 案件診断レポートを生成';
                    setLoading(false);
                })
                .withFailureHandler(err => {
                    removeTyping();
                    showError(err.message);
                    btn.disabled = false;
                    btn.innerHTML = '<i class="bi bi-clipboard2-pulse"></i> 案件診断レポートを生成';
                    setLoading(false);
                })
                .getCaseDiagnosis(caseId);
        }

        /* ====== UI ヘルパー ====== */
        function appendMsg(role, content, mode) {
            const area = document.getElementById('chatArea');
            const div = document.createElement('div');
            if (role === 'user') {
                div.className = 'msg msg-user';
            } else if (mode === 'adv') {
                div.className = 'msg msg-assistant-adv';
            } else {
                div.className = 'msg msg-assistant-doc';
            }
            div.innerHTML = formatContent(content);
            area.appendChild(div);
            scrollBottom();
        }

        function showTyping() {
            const area = document.getElementById('chatArea');
            const div = document.createElement('div');
            div.className = 'typing-indicator';
            div.id = 'typingIndicator';
            div.innerHTML = currentTab === 'adv'
                ? '<i class="bi bi-compass"></i> アドバイザーが分析中...'
                : '<i class="bi bi-pencil"></i> AIが作成中...';
            area.appendChild(div);
            scrollBottom();
        }

        function removeTyping() {
            const el = document.getElementById('typingIndicator');
            if (el) el.remove();
        }

        function showError(msg) {
            const area = document.getElementById('chatArea');
            const div = document.createElement('div');
            div.className = 'msg msg-system';
            div.style.color = '#dc2626';
            div.innerHTML = '<i class="bi bi-exclamation-triangle"></i> エラー: ' + escapeHtml(msg);
            area.appendChild(div);
            scrollBottom();
        }

        function setLoading(v) {
            isLoading = v;
            document.getElementById('btnSend').disabled = v;
            document.getElementById('msgInput').disabled = v;
        }

        function scrollBottom() {
            const area = document.getElementById('chatArea');
            area.scrollTop = area.scrollHeight;
        }

        function handleKey(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
            // auto-resize
            const ta = e.target;
            ta.style.height = '42px';
            ta.style.height = Math.min(ta.scrollHeight, 120) + 'px';
        }

        /* ====== Markdown 簡易変換 ====== */
        function formatContent(text) {
            if (!text) return '';
            let s = escapeHtml(text);
            // ## 見出し
            s = s.replace(/^## (.+)$/gm, '<strong style="font-size:1.05rem;">$1</strong>');
            // **太字**
            s = s.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
            // - リスト
            s = s.replace(/^[・-] (.+)$/gm, '&bull; $1');
            // 数字リスト
            s = s.replace(/^(\d+)\. (.+)$/gm, '<strong>$1.</strong> $2');
            // 改行
            s = s.replace(/\n/g, '<br>');
            return s;
        }

        function escapeHtml(str) {
            if (!str) return '';
            const d = document.createElement('div');
            d.textContent = str;
            return d.innerHTML;
        }
    </script>
</body>

</html>
